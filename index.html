<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - Combine PDFs Online</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="pdflogo.png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer">
        </script>

    <meta name="description"
        content="Merge two PDF files into one easily with our online PDF Merger. Preserve bookmarks and customize output filename.">
    <meta name="keywords" content="PDF Merger, Combine PDFs, Merge PDF Files, Online PDF Tool, PDF Utilities">
    <meta name="Aadarsh Patil" content="AG CREATIONS">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-pdf"></i> PDF Merger</h1>
            <p>Combine two PDF files into one seamlessly</p>
        </header>

        <main>
            <div class="upload-section" id="uploadSection">
                <!-- slots are rendered dynamically by JS -->
            </div>
            <div style="text-align: center; margin-bottom: 30px;">
                <button id="addFileBtn" class="add-file-btn">
                    <i class="fas fa-plus"></i> Add another PDF
                </button>
            </div>

            <div class="options-section">
                <h3>Merge Options</h3>
                <div class="option-group">
                    <label for="filename">Output filename:</label>
                    <input type="text" id="filename" placeholder="merged-document" value="merged-document">
                </div>
                <div class="option-group">
                    <label>
                        <input type="checkbox" id="preserveBookmarks" checked>
                        Preserve bookmarks <small style="color: var(--text-secondary); font-weight: 400;">(from first
                            PDF)</small>
                    </label>
                </div>
            </div>

            <div class="action-section">
                <button id="mergeBtn" class="merge-btn" disabled>
                    <i class="fas fa-magic"></i>
                    Merge PDFs
                </button>
                <button id="clearBtn" class="clear-btn">
                    <i class="fas fa-trash"></i>
                    Clear All
                </button>
            </div>

            <div class="progress-section" id="progressSection" style="display: none;">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText">Merging PDFs...</p>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="success-message">
                    <i class="fas fa-check-circle"></i>
                    <h3>PDFs Merged Successfully!</h3>
                    <button id="downloadBtn" class="download-btn">
                        <i class="fas fa-download"></i>
                        Download Merged PDF
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>© 2025 PDF Merger. Built with ❤️ for productivity.</p>
                <div class="brand-signature">
                    <span>🔥 </span>
                    <span class="ag-brand"> AG CREATIONS </span>
                    <span> 🔥</span>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/script.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>

</html>
